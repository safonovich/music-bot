<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ambient Mixer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --accent: #673ab8;
      --accent-light: #9c6fe4;
      --bg: #0e0e1a;
      --card: #1a1a2e;
      --card-active: #261b42;
      --text: #e0e0f0;
      --text-dim: #606080;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 18px 16px 10px;
      font-size: 17px;
      font-weight: 700;
      color: var(--accent-light);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 8px 12px 0;
      flex: 1;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 2px solid transparent;
      padding: 14px 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      user-select: none;
    }

    .card.active {
      background: var(--card-active);
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(103, 58, 184, 0.25);
    }

    .card-emoji {
      font-size: 30px;
      line-height: 1;
      transition: transform 0.2s;
    }
    .card.active .card-emoji { transform: scale(1.12); }

    .card-name {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      font-weight: 500;
      transition: color 0.2s;
      line-height: 1.2;
    }
    .card.active .card-name { color: var(--text); }

    .slider-wrap {
      width: 100%;
      padding: 0 2px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: #2a2a44;
      outline: none;
      cursor: pointer;
      opacity: 0.35;
      transition: opacity 0.2s;
    }
    .card.active input[type=range] { opacity: 1; }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--accent-light);
      cursor: pointer;
      box-shadow: 0 0 5px rgba(156, 111, 228, 0.6);
    }
    input[type=range]::-moz-range-thumb {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--accent-light);
      border: none;
      cursor: pointer;
    }

    /* Slider fill (progress) */
    input[type=range] {
      background: linear-gradient(to right, var(--accent-light) 0%, var(--accent-light) var(--val, 0%), #2a2a44 var(--val, 0%), #2a2a44 100%);
    }

    /* Bottom controls */
    #timer-display {
      text-align: center;
      font-size: 12px;
      color: var(--accent-light);
      height: 18px;
      margin-top: 10px;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 8px 12px 24px;
      justify-content: center;
    }

    .btn {
      flex: 1;
      max-width: 120px;
      padding: 11px 0;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--card);
      color: var(--text-dim);
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }
    .btn.active { background: var(--accent); color: #fff; }
    .btn:active { transform: scale(0.94); }

    .timer-wrap { position: relative; flex: 1; max-width: 120px; display: flex; }
    .timer-wrap .btn { width: 100%; }

    .timer-menu {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e36;
      border: 1px solid #333355;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
      z-index: 100;
      min-width: 130px;
    }
    .timer-menu.open { display: block; }

    .timer-option {
      padding: 11px 20px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text);
      text-align: center;
      transition: background 0.15s;
    }
    .timer-option:hover, .timer-option:active { background: var(--accent); }
    .timer-option.cancel-opt { color: #e05555; border-top: 1px solid #333355; }

    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--accent);
      color: #fff;
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header>✦ Ambient Mixer</header>
  <div class="grid" id="grid"></div>
  <div id="timer-display"></div>
  <div class="controls">
    <button class="btn" id="btn-animate" onclick="toggleAnimate()">Animate</button>
    <div class="timer-wrap">
      <button class="btn" id="btn-timer" onclick="toggleTimerMenu()">Timer</button>
      <div class="timer-menu" id="timer-menu">
        <div class="timer-option" onclick="setTimer(15)">15 min</div>
        <div class="timer-option" onclick="setTimer(30)">30 min</div>
        <div class="timer-option" onclick="setTimer(45)">45 min</div>
        <div class="timer-option" onclick="setTimer(60)">60 min</div>
        <div class="timer-option cancel-opt" onclick="cancelTimer()">Cancel</div>
      </div>
    </div>
    <button class="btn" onclick="shareMix()">Share</button>
  </div>
  <div id="toast"></div>

  <script>
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.expand();
      Telegram.WebApp.setBackgroundColor('#0e0e1a');
      Telegram.WebApp.setHeaderColor('#0e0e1a');
    }

    const SOUNDS = [
      { id: 'rain',       name: 'Rain',       file: 'rain.mp3',       emoji: '🌧️', def: 0.70 },
      { id: 'thunder',    name: 'Thunder',    file: 'thunder.mp3',    emoji: '🌩️', def: 0.50 },
      { id: 'waves',      name: 'Waves',      file: 'waves.mp3',      emoji: '🌊', def: 0.60 },
      { id: 'wind',       name: 'Wind',       file: 'wind.mp3',       emoji: '💨', def: 0.50 },
      { id: 'fire',       name: 'Fire',       file: 'fire.mp3',       emoji: '🔥', def: 0.60 },
      { id: 'birds',      name: 'Birds',      file: 'birds.mp3',      emoji: '🐦', def: 0.55 },
      { id: 'handpan',    name: 'Hang Drum',  file: 'handpan.mp3',    emoji: '🥁', def: 0.50 },
      { id: 'didgeridoo', name: 'Didgeridoo', file: 'didgeridoo.mp3', emoji: '🎵', def: 0.20 },
      { id: 'ambient',    name: 'Ambient',    file: 'ambient.mp3',    emoji: '🌌', def: 0.25 },
    ];

    const state = {};
    const audios = {};
    let animateInterval = null;
    let timerTimeout = null;
    let timerTick = null;
    let timerEnd = null;

    // Build grid
    const grid = document.getElementById('grid');
    SOUNDS.forEach(s => {
      state[s.id] = { active: false, volume: s.def };

      const audio = new Audio(s.file);
      audio.loop = true;
      audio.volume = s.def;
      audio.preload = 'none';
      audios[s.id] = audio;

      const card = document.createElement('div');
      card.className = 'card';
      card.id = 'card-' + s.id;
      card.innerHTML = `
        <div class="card-emoji">${s.emoji}</div>
        <div class="card-name">${s.name}</div>
        <div class="slider-wrap">
          <input type="range" min="0" max="100"
            value="${Math.round(s.def * 100)}"
            id="slider-${s.id}"
            style="--val: ${Math.round(s.def * 100)}%"
            oninput="onSlider('${s.id}', this)"
            onclick="event.stopPropagation()"
            ontouchstart="event.stopPropagation()">
        </div>`;
      card.addEventListener('click', () => toggleSound(s.id));
      grid.appendChild(card);
    });

    function toggleSound(id) {
      const s = state[id];
      s.active = !s.active;
      const card = document.getElementById('card-' + id);
      if (s.active) {
        audios[id].volume = s.volume;
        audios[id].play().catch(() => {});
        card.classList.add('active');
      } else {
        audios[id].pause();
        card.classList.remove('active');
      }
    }

    function onSlider(id, el) {
      const v = el.value / 100;
      el.style.setProperty('--val', el.value + '%');
      state[id].volume = v;
      audios[id].volume = v;
      if (!state[id].active && v > 0) {
        state[id].active = true;
        audios[id].play().catch(() => {});
        document.getElementById('card-' + id).classList.add('active');
      }
    }

    // Animate
    function toggleAnimate() {
      const btn = document.getElementById('btn-animate');
      if (animateInterval) {
        clearInterval(animateInterval);
        animateInterval = null;
        btn.classList.remove('active');
      } else {
        animateInterval = setInterval(animateStep, 4000);
        btn.classList.add('active');
        animateStep();
      }
    }

    function animateStep() {
      SOUNDS.forEach(s => {
        if (!state[s.id].active) return;
        const cur = state[s.id].volume;
        const delta = (Math.random() - 0.5) * 0.35;
        const next = Math.min(0.98, Math.max(0.05, cur + delta));
        state[s.id].volume = next;
        audios[s.id].volume = next;
        const el = document.getElementById('slider-' + s.id);
        el.value = Math.round(next * 100);
        el.style.setProperty('--val', Math.round(next * 100) + '%');
      });
    }

    // Timer
    function toggleTimerMenu() {
      document.getElementById('timer-menu').classList.toggle('open');
    }

    function setTimer(min) {
      document.getElementById('timer-menu').classList.remove('open');
      if (timerTimeout) clearTimeout(timerTimeout);
      if (timerTick) clearInterval(timerTick);
      timerEnd = Date.now() + min * 60000;
      timerTimeout = setTimeout(stopAll, min * 60000);
      document.getElementById('btn-timer').classList.add('active');
      updateTimerDisplay();
      timerTick = setInterval(updateTimerDisplay, 1000);
    }

    function cancelTimer() {
      document.getElementById('timer-menu').classList.remove('open');
      if (timerTimeout) clearTimeout(timerTimeout);
      if (timerTick) clearInterval(timerTick);
      timerEnd = null;
      document.getElementById('btn-timer').classList.remove('active');
      document.getElementById('timer-display').textContent = '';
    }

    function updateTimerDisplay() {
      if (!timerEnd) return;
      const left = timerEnd - Date.now();
      if (left <= 0) { document.getElementById('timer-display').textContent = ''; return; }
      const m = Math.floor(left / 60000);
      const s = Math.floor((left % 60000) / 1000);
      document.getElementById('timer-display').textContent = `⏱ ${m}:${s.toString().padStart(2, '0')}`;
    }

    function stopAll() {
      SOUNDS.forEach(s => {
        if (state[s.id].active) {
          state[s.id].active = false;
          audios[s.id].pause();
          document.getElementById('card-' + s.id).classList.remove('active');
        }
      });
      if (animateInterval) {
        clearInterval(animateInterval);
        animateInterval = null;
        document.getElementById('btn-animate').classList.remove('active');
      }
      cancelTimer();
    }

    // Share
    function shareMix() {
      const params = new URLSearchParams();
      SOUNDS.forEach(s => {
        if (state[s.id].active) params.set(s.id, Math.round(state[s.id].volume * 100));
      });
      const url = location.origin + location.pathname + (params.toString() ? '?' + params.toString() : '');
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(url).then(() => showToast('✓ Link copied!'));
      } else {
        showToast('✓ Link ready!');
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Restore mix from URL
    (() => {
      const params = new URLSearchParams(location.search);
      SOUNDS.forEach(s => {
        const val = params.get(s.id);
        if (val !== null) {
          const v = parseInt(val) / 100;
          state[s.id] = { active: true, volume: v };
          audios[s.id].volume = v;
          audios[s.id].play().catch(() => {});
          const card = document.getElementById('card-' + s.id);
          card.classList.add('active');
          const slider = document.getElementById('slider-' + s.id);
          slider.value = parseInt(val);
          slider.style.setProperty('--val', val + '%');
        }
      });
    })();

    // Close timer menu on outside tap
    document.addEventListener('click', e => {
      if (!e.target.closest('.timer-wrap')) {
        document.getElementById('timer-menu').classList.remove('open');
      }
    });
  </script>
</body>
</html>
